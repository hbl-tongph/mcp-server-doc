name: Deploy mcp-server to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'ecosystem.config.cjs'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build & Test (chạy trên GitHub runner)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Deploy to EC2
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to EC2
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='db.sqlite*' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            ubuntu@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/

      - name: Install production dependencies & restart
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST }} \
            "
              set -e
              cd ${{ secrets.EC2_APP_DIR }}

              echo '--- npm install (production) ---'
              npm ci --omit=dev

              echo '--- Migrate DB ---'
              node dist/migrate.js 2>/dev/null || true

              echo '--- Ensure log directory ---'
              sudo mkdir -p /var/log/mcp-server
              sudo chown ubuntu:ubuntu /var/log/mcp-server

              echo '--- Restart PM2 ---'
              pm2 delete mcp-doc 2>/dev/null || true
              pm2 start ecosystem.config.cjs --env production

              pm2 save
              echo '--- Done ---'
            "
